<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuit - A multi-purpose Discord bot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div id="hero">
            <canvas id="star-canvas"></canvas>
            <div class="tags">
                <p class="tag tag_foss">Free and Open Source Software</p>
                <p class="tag tag_selfhost">Self-hostable</p>
                <p class="tag tag_license">AGPL-3.0 License</p>
            </div>
            <h1 class="hero_primary">A Discord bot that<br>works <span class="italic">your</span> way, not <span
                    class="through">theirs</span>.
            </h1>
            <p class="hero_desc">Nuit is a fully customizable, self-hostable Discord bot. No locked features, no paid
                services, just your server and your rules.</p>
            <div class="buttons">
                <a href="/auth/discord/login"><button class="hero_button primary">Login to Discord</button></a>
                <a href="https://github.com/Nuit-Bot/Nuit#production"><button class="hero_button secondary">Self-host
                        yours</button></a>
            </div>
        </div>
    </main>

    <script src="/stars.js"></script>
</body>

</html>
