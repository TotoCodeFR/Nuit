name: Notify Discord on Release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Release tag (e.g. v0.2.1)"
                required: true
                type: string
            name:
                description: "Release name"
                required: true
                type: string
            body:
                description: "Release notes"
                required: false
                type: string
                default: ""
            prerelease:
                description: "Is this a prerelease?"
                required: false
                type: boolean
                default: false
jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Fetch tags only
              run: |
                  git init
                  git remote add origin https://github.com/${{ github.repository }}.git
                  git fetch --depth=1 origin +refs/tags/*:refs/tags/*

            - name: Set release variables
              id: vars
              run: |
                  set_output() {
                    local key="$1"
                    local value="$2"
                    local delim
                    delim="__NuitOutput_$(date +%s%N)__"
                    {
                      printf "%s<<%s\n" "$key" "$delim"
                      printf "%s\n" "$value"
                      printf "%s\n" "$delim"
                    } >> "$GITHUB_OUTPUT"
                  }

                  if [ "${{ github.event_name }}" = "release" ]; then
                    set_output "tag_name" "${{ github.event.release.tag_name }}"
                    set_output "name" "${{ github.event.release.name }}"
                    set_output "body" "${{ github.event.release.body }}"
                    set_output "prerelease" "${{ github.event.release.prerelease }}"
                    set_output "author" "${{ github.event.release.author.login }}"
                    set_output "author_url" "https://github.com/${{ github.event.release.author.login }}"
                    set_output "author_icon" "${{ github.event.release.author.avatar_url }}"
                    set_output "html_url" "${{ github.event.release.html_url }}"
                    set_output "published_at" "${{ github.event.release.published_at }}"
                  else
                    set_output "tag_name" "${{ inputs.tag_name }}"
                    set_output "name" "${{ inputs.name }}"
                    set_output "body" "${{ inputs.body }}"
                    set_output "prerelease" "${{ inputs.prerelease }}"
                    set_output "author" "${{ github.actor }}"
                    set_output "author_url" "https://github.com/${{ github.actor }}"
                    AUTHOR_ICON=$(curl -fsSL "https://api.github.com/users/${{ github.actor }}" | jq -r '.avatar_url // ""')
                    set_output "author_icon" "$AUTHOR_ICON"
                    set_output "html_url" "https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag_name }}"
                    set_output "published_at" "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  fi

            - name: Send Discord embed
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
                  PING_ROLE_ID: ${{ secrets.PING_ROLE_ID }}
              run: |
                  VERSION="${{ steps.vars.outputs.tag_name }}"

                  # Strip leading 'v', then split into parts
                  SEMVER="${VERSION#v}"
                  IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$SEMVER"

                  # If a 4th segment (build/hotfix) changed, skip the ping
                  if [ -n "$BUILD" ]; then
                    BUMP_TYPE=""
                  elif [ -n "$MAJOR" ] && [ -n "$MINOR" ] && [ -n "$PATCH" ]; then
                    # Determine which segment bumped by comparing to the previous tag
                    PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
                    if [ -n "$PREV_TAG" ]; then
                      PREV="${PREV_TAG#v}"
                      IFS='.' read -r PREV_MAJOR PREV_MINOR PREV_PATCH <<< "$PREV"
                      if [ "$MAJOR" != "$PREV_MAJOR" ]; then
                        BUMP_TYPE="major"
                      elif [ "$MINOR" != "$PREV_MINOR" ]; then
                        BUMP_TYPE="minor"
                      else
                        BUMP_TYPE="patch"
                      fi
                    else
                      BUMP_TYPE="major"
                    fi
                  else
                    BUMP_TYPE=""
                  fi

                  # Send ping message if applicable
                  if [ -n "$BUMP_TYPE" ]; then
                    PING_PAYLOAD=$(jq -n \
                      --arg content "<@&${PING_ROLE_ID}> New Nuit $BUMP_TYPE version" \
                      '{ content: $content }')
                    curl -fsSL -X POST "$DISCORD_WEBHOOK" \
                      -H "Content-Type: application/json" \
                      -d "$PING_PAYLOAD"
                  fi

                  NAME="${{ steps.vars.outputs.name }}"
                  URL="${{ steps.vars.outputs.html_url }}"
                  AUTHOR="${{ steps.vars.outputs.author }}"
                  AUTHOR_URL="${{ steps.vars.outputs.author_url }}"
                  AUTHOR_ICON="${{ steps.vars.outputs.author_icon }}"
                  PUBLISHED_AT="${{ steps.vars.outputs.published_at }}"
                  PRERELEASE="${{ steps.vars.outputs.prerelease }}"

                  # Truncate body to Discord's embed description limit (4096 chars)
                  BODY=$(cat << 'EOF'
                  ${{ steps.vars.outputs.body }}
                  EOF
                  )
                  BODY="${BODY:0:4000}"
                  BODY=$(echo "$BODY" | jq -Rsa .)

                  if [ "$PRERELEASE" = "true" ]; then
                    TITLE="🚧 $NAME ($VERSION)"
                    COLOR=16744272  # orange
                  else
                    TITLE="🚀 $NAME ($VERSION)"
                    COLOR=5793266   # blurple
                  fi

                  TIMESTAMP=$(date -d "$PUBLISHED_AT" -u +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || date -u +"%Y-%m-%dT%H:%M:%SZ")

                  PAYLOAD=$(jq -n \
                    --arg title "$TITLE" \
                    --arg url "$URL" \
                    --argjson description "$BODY" \
                    --argjson color "$COLOR" \
                    --arg author "$AUTHOR" \
                    --arg author_url "$AUTHOR_URL" \
                    --arg author_icon "$AUTHOR_ICON" \
                    --arg timestamp "$TIMESTAMP" \
                    --arg repo "${{ github.repository }}" \
                    '{
                      embeds: [{
                        title: $title,
                        url: $url,
                        description: $description,
                        color: $color,
                        author: {
                          name: $author,
                          url: $author_url,
                          icon_url: $author_icon
                        },
                        footer: {
                          text: $repo
                        },
                        timestamp: $timestamp
                      }]
                    }')

                  curl -fsSL -X POST "$DISCORD_WEBHOOK" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD"
